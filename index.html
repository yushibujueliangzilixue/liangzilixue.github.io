<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>父亲节快乐 — 何建鹏</title>
<style>
*{margin:0;padding:0;overflow:hidden;}
body{width:100vw;height:100vh;background:#000;touch-action:none;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
.tip{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    color:#fff;font-size:14px;z-index:999;
    background:rgba(0,0,0,0.7);padding:6px 16px;border-radius:8px;
}
audio{display:none;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="tip">拖动旋转星云 | 双指缩放远近</div>
<audio id="boom" preload="auto">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-firework-burst-2796.mp3" type="audio/mpeg">

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const audio = document.getElementById('boom');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// 全局交互变量
let rotateY = 0, rotateX = 0;
let scale = 0; // 开场从0开始膨胀
let targetScale = 1;
let touchStartX, touchStartY, touchStartDist;
let isTouch = false;

// 星空粒子数组
const stars = [];
const starCount = 800;

// 烟花数组
const fireworks = [];

// 初始化星空粒子（3D坐标）
function initStars() {
    for(let i=0;i<starCount;i++) {
        stars.push({
            x: (Math.random()-0.5)*2500, // 扩大星云范围
            y: (Math.random()-0.5)*2500,
            z: (Math.random()-0.5)*2500,
            size: Math.random()*2.5 + 0.3,
            brightness: Math.random()*0.7 + 0.2
        });
    }
}

// 绘制3D星空（强化透视效果）
function drawStars() {
    stars.forEach(star => {
        // 3D坐标变换
        let x = star.x;
        let y = star.y;
        let z = star.z;

        // 旋转Y轴
        let cosY = Math.cos(rotateY*Math.PI/180);
        let sinY = Math.sin(rotateY*Math.PI/180);
        let nx = x*cosY - z*sinY;
        let nz = x*sinY + z*cosY;
        x = nx; z = nz;

        // 旋转X轴
        let cosX = Math.cos(rotateX*Math.PI/180);
        let sinX = Math.sin(rotateX*Math.PI/180);
        let ny = y*cosX - z*sinX;
        nz = y*sinX + z*cosX;
        y = ny; z = nz;

        // 增强透视强度，3D效果更明显
        let perspective = 800/(800+z);
        let screenX = width/2 + x*perspective*scale;
        let screenY = height/2 + y*perspective*scale;
        let size = star.size*perspective*scale;

        if(screenX>0 && screenX<width && screenY>0 && screenY<height && size>0.1) {
            ctx.beginPath();
            ctx.arc(screenX, screenY, size, 0, Math.PI*2);
            ctx.fillStyle = `rgba(220,200,255,${star.brightness*perspective*1.2})`;
            ctx.fill();
        }
    });
}

// 绘制文字（主标题+空两行+落款）
function drawText() {
    ctx.save();
    ctx.translate(width/2, height/2);
    ctx.scale(scale, scale);

    // 主文字
    ctx.font = 'bold 8vw Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 黑色描边（最外层）
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 6;
    ctx.strokeText('老逗，父亲节快乐！', 0, -40);

    // 白色填充
    ctx.fillStyle = '#fff';
    ctx.fillText('老逗，父亲节快乐！', 0, -40);

    // 金色发光
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 25;
    ctx.fillText('老逗，父亲节快乐！', 0, -40);

    // 落款：空两行显示
    ctx.font = 'bold 4vw Microsoft YaHei';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText('——何建鹏', 0, 100); // y坐标从50改成100，空出两行
    ctx.fillStyle = '#fffbe0';
    ctx.fillText('——何建鹏', 0, 100);

    ctx.restore();
}

// 烟花类
class Firework {
    constructor() {
        this.x = Math.random()*width;
        this.y = height;
        this.targetY = Math.random()*height*0.4;
        this.speedY = -6 - Math.random()*3;
        this.particles = [];
        this.exploded = false;
        this.color = `hsl(${Math.random()*360},100%,60%)`;
    }

    update() {
        if(!this.exploded) {
            this.y += this.speedY;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y+8);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            if(this.y <= this.targetY) {
                this.explode();
                this.exploded = true;
                // 播放烟花音效
                audio.currentTime = 0;
                audio.play().catch(()=>{});
            }
        } else {
            this.particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12;
                p.life--;
            });
            this.particles = this.particles.filter(p => p.life>0);
        }
    }

    explode() {
        for(let i=0;i<80;i++) {
            const angle = Math.PI*2/80*i;
            const spd = Math.random()*4 + 2;
            this.particles.push({
                x: this.x, y: this.y,
                vx: Math.cos(angle)*spd,
                vy: Math.sin(angle)*spd,
                life: 60,
                color: this.color
            });
        }
    }

    draw() {
        if(!this.exploded) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        } else {
            this.particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
        }
    }
}

// 手势交互（提高旋转灵敏度）
function getTouchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

document.addEventListener('touchstart', e => {
    isTouch = true;
    if(e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    } else if(e.touches.length === 2) {
        touchStartDist = getTouchDist(e.touches);
    }
    // 解锁微信音频
    audio.volume = 0.4;
});

document.addEventListener('touchmove', e => {
    e.preventDefault();
    if(!isTouch) return;

    if(e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        rotateY += dx * 0.4; // 提高旋转灵敏度
        rotateX -= dy * 0.4;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    } else if(e.touches.length === 2) {
        const dist = getTouchDist(e.touches);
        const delta = dist - touchStartDist;
        targetScale += delta * 0.001;
        targetScale = Math.max(0.5, Math.min(targetScale, 2.5));
        touchStartDist = dist;
    }
});

document.addEventListener('touchend', () => isTouch = false);

// 窗口大小适配
window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

// 主渲染循环
function render() {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0,0,width,height);

    // 开场膨胀动画
    if(scale < targetScale) {
        scale += 0.015;
        if(scale > targetScale) scale = targetScale;
    }

    // 提高自动旋转速度，3D效果更明显
    if(!isTouch) {
        rotateY += 0.08;
    }

    drawStars();
    drawText();

    // 更新绘制烟花
    fireworks.forEach(f => {f.update(); f.draw();});
    // 清理已结束的烟花
    for(let i=fireworks.length-1;i>=0;i--) {
        if(fireworks[i].exploded && fireworks[i].particles.length === 0) {
            fireworks.splice(i,1);
        }
    }

    requestAnimationFrame(render);
}

// 初始化并启动
initStars();
setInterval(() => fireworks.push(new Firework()), 900);
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>父亲节快乐 — 何建鹏</title>
<style>
*{margin:0;padding:0;overflow:hidden;}
body{width:100vw;height:100vh;background:#000;touch-action:none;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
.tip{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    color:#fff;font-size:14px;z-index:999;
    background:rgba(0,0,0,0.7);padding:6px 16px;border-radius:8px;
}
audio{display:none;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="tip">拖动旋转星云 | 双指缩放远近</div>
<audio id="boom" preload="auto">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-firework-burst-2796.mp3" type="audio/mpeg">

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const audio = document.getElementById('boom');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// 全局交互变量（修复缩放逻辑：统一用globalScale控制整体缩放）
let rotateY = 0, rotateX = 0;
let globalScale = 0; // 开场从0开始膨胀
let touchStartX, touchStartY, touchStartDist;
let isTouch = false;

// 星空粒子数组
const stars = [];
const starCount = 900;

// 烟花数组
const fireworks = [];

// 流星数组
const meteors = [];

// 初始化星空粒子（3D坐标+深度信息）
function initStars() {
    for(let i=0;i<starCount;i++) {
        stars.push({
            x: (Math.random()-0.5)*3000,
            y: (Math.random()-0.5)*3000,
            z: (Math.random()-0.5)*3000,
            size: Math.random()*3 + 0.3,
            brightness: Math.random()*0.7 + 0.2,
            depth: 0 // 用于深度排序
        });
    }
}

// 绘制3D星空（优化缩放效果+深度排序+光晕）
function drawStars() {
    // 先计算所有粒子的屏幕坐标和深度
    const screenStars = [];
    stars.forEach(star => {
        // 3D坐标变换
        let x = star.x;
        let y = star.y;
        let z = star.z;

        // 旋转Y轴
        let cosY = Math.cos(rotateY*Math.PI/180);
        let sinY = Math.sin(rotateY*Math.PI/180);
        let nx = x*cosY - z*sinY;
        let nz = x*sinY + z*cosY;
        x = nx; z = nz;

        // 旋转X轴
        let cosX = Math.cos(rotateX*Math.PI/180);
        let sinX = Math.sin(rotateX*Math.PI/180);
        let ny = y*cosX - z*sinX;
        nz = y*sinX + z*cosX;
        y = ny; z = nz;

        // 透视投影（优化缩放时的粒子大小变化）
        let perspective = 800/(800+z);
        let screenX = width/2 + x*perspective*globalScale;
        let screenY = height/2 + y*perspective*globalScale;
        let size = star.size*perspective*globalScale;
        let brightness = star.brightness*perspective;

        if(screenX>-50 && screenX<width+50 && screenY>-50 && screenY<height+50 && size>0.1) {
            screenStars.push({
                x: screenX,
                y: screenY,
                size: size,
                brightness: brightness,
                depth: z
            });
        }
    });

    // 深度排序：远处粒子先画，近处粒子后画
    screenStars.sort((a,b) => a.depth - b.depth);

    // 绘制所有粒子（带渐变光晕）
    screenStars.forEach(star => {
        // 外层光晕
        const gradient = ctx.createRadialGradient(
            star.x, star.y, 0,
            star.x, star.y, star.size*3
        );
        gradient.addColorStop(0, `rgba(230,210,255,${star.brightness*0.8})`);
        gradient.addColorStop(1, 'rgba(230,210,255,0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size*3, 0, Math.PI*2);
        ctx.fill();

        // 核心粒子
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${star.brightness})`;
        ctx.fill();
    });
}

// 绘制流星
function drawMeteors() {
    // 随机生成流星
    if(Math.random() < 0.005) {
        meteors.push({
            x: Math.random()*width,
            y: -50,
            speed: Math.random()*15 + 10,
            length: Math.random()*80 + 40,
            opacity: Math.random()*0.5 + 0.3
        });
    }

    // 更新绘制流星
    for(let i=meteors.length-1;i>=0;i--) {
        const m = meteors[i];
        m.x += m.speed*0.7;
        m.y += m.speed;

        // 绘制流星拖尾
        const gradient = ctx.createLinearGradient(
            m.x, m.y,
            m.x - m.length*0.7, m.y - m.length
        );
        gradient.addColorStop(0, `rgba(255,255,255,${m.opacity})`);
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.length*0.7, m.y - m.length);
        ctx.stroke();

        // 移除超出屏幕的流星
        if(m.y > height + 100) {
            meteors.splice(i,1);
        }
    }
}

// 绘制文字（主标题+空两行+落款）
function drawText() {
    ctx.save();
    ctx.translate(width/2, height/2);
    ctx.scale(globalScale, globalScale);

    // 主文字
    ctx.font = 'bold 8vw Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 黑色描边（最外层）
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 6;
    ctx.strokeText('老逗，父亲节快乐！', 0, -40);

    // 白色填充
    ctx.fillStyle = '#fff';
    ctx.fillText('老逗，父亲节快乐！', 0, -40);

    // 金色发光
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 25;
    ctx.fillText('老逗，父亲节快乐！', 0, -40);

    // 落款：空两行显示
    ctx.font = 'bold 4vw Microsoft YaHei';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText('——何建鹏', 0, 100);
    ctx.fillStyle = '#fffbe0';
    ctx.fillText('——何建鹏', 0, 100);

    ctx.restore();
}

// 烟花类
class Firework {
    constructor() {
        this.x = Math.random()*width;
        this.y = height;
        this.targetY = Math.random()*height*0.4;
        this.speedY = -6 - Math.random()*3;
        this.particles = [];
        this.exploded = false;
        this.color = `hsl(${Math.random()*360},100%,60%)`;
    }

    update() {
        if(!this.exploded) {
            this.y += this.speedY;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y+8);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            if(this.y <= this.targetY) {
                this.explode();
                this.exploded = true;
                // 播放烟花音效
                audio.currentTime = 0;
                audio.play().catch(()=>{});
            }
        } else {
            this.particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12;
                p.life--;
            });
            this.particles = this.particles.filter(p => p.life>0);
        }
    }

    explode() {
        for(let i=0;i<80;i++) {
            const angle = Math.PI*2/80*i;
            const spd = Math.random()*4 + 2;
            this.particles.push({
                x: this.x, y: this.y,
                vx: Math.cos(angle)*spd,
                vy: Math.sin(angle)*spd,
                life: 60,
                color: this.color
            });
        }
    }

    draw() {
        if(!this.exploded) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        } else {
            this.particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
        }
    }
}

// 手势交互（彻底修复缩放逻辑）
function getTouchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

document.addEventListener('touchstart', e => {
    isTouch = true;
    if(e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    } else if(e.touches.length === 2) {
        touchStartDist = getTouchDist(e.touches);
    }
    // 解锁微信音频
    audio.volume = 0.4;
});

document.addEventListener('touchmove', e => {
    e.preventDefault();
    if(!isTouch) return;

    if(e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        rotateY += dx * 0.4;
        rotateX -= dy * 0.4;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    } else if(e.touches.length === 2) {
        const dist = getTouchDist(e.touches);
        const delta = dist - touchStartDist;
        // 修复缩放：直接修改globalScale，限制在0.3~3.0之间
        globalScale += delta * 0.001;
        globalScale = Math.max(0.3, Math.min(globalScale, 3.0));
        touchStartDist = dist;
    }
});

document.addEventListener('touchend', () => isTouch = false);

// 窗口大小适配
window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

// 主渲染循环
function render() {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0,0,width,height);

    // 开场膨胀动画
    if(globalScale < 1) {
        globalScale += 0.015;
        if(globalScale > 1) globalScale = 1;
    }

    // 自动缓慢旋转
    if(!isTouch) {
        rotateY += 0.06;
    }

    drawStars();
    drawMeteors();
    drawText();

    // 更新绘制烟花
    fireworks.forEach(f => {f.update(); f.draw();});
    // 清理已结束的烟花
    for(let i=fireworks.length-1;i>=0;i--) {
        if(fireworks[i].exploded && fireworks[i].particles.length === 0) {
            fireworks.splice(i,1);
        }
    }

    requestAnimationFrame(render);
}

// 初始化并启动
initStars();
setInterval(() => fireworks.push(new Firework()), 900);
render();
</script>
</body>
</html>
